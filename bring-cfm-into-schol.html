<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Code For ME Map</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f7fb;
  padding:50px;
}

/* SECTION */

.map-section{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:50px;
  flex-wrap:wrap;
}

/* LEFT SIDE TEXT */

.info{
  max-width:350px;
}

.info h1{
  font-size:3rem;
  color:#1f3c58;
  margin-bottom:15px;
}

.info p{
  color:#4b5d6b;
  line-height:1.6;
  margin-bottom:25px;
}

/* FORM */

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:white;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
  margin-bottom:15px;
  font-size:1rem;
}

button{
  background:#68b6ba;
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:1rem;
  transition:.2s;
}

button:hover{
  background:#4ea2a7;
}

/* MAP */

.map-container{
  position:relative;
  width:380px;
}

.map{
  width:100%;
  user-select:none;
  -webkit-user-drag:none;
  pointer-events:none;
}

/* LOCATION PINS */

.pin,
.user-pin{
  width:22px;
  height:22px;
  position:absolute;
  border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  border:2px solid white;
}

.pin{
  background:#efab03;
}

.user-pin{
  background:#d47571;
  cursor:grab;
  z-index:100;
  display:none;
}

.pin::after,
.user-pin::after{
  content:'';
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:5px;
  left:5px;
}

/* TOOLTIP */

.tooltip{
  position:absolute;
  top:-35px;
  left:-15px;
  background:#1f3c58;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  font-size:.8rem;
  white-space:nowrap;
  opacity:0;
  transition:.2s;
  pointer-events:none;
}

.pin:hover .tooltip{
  opacity:1;
}

/* EXISTING LOCATIONS */

.bath{
  top:240px;
  left:265px;
}

.woolwich{
  top:225px;
  left:270px;
}

.mess{
  top:150px;
  left:210px;
}

.sacopee{
  top:220px;
  left:140px;
}

.rockland{
  top:210px;
  left:245px;
}

</style>
</head>

<body>

<section class="map-section">

  <!-- LEFT SIDE -->
  <div class="info">

    <h1>Across Maine</h1>

    <p>
      Code For ME has taught students all across Maine.
      Add your school or town and drag your pin onto the map!
    </p>

    <input type="text" placeholder="Your school or town">

    <button onclick="showPin()">
      Add My Pin
    </button>

  </div>

  <!-- RIGHT SIDE -->
  <div class="map-container" id="mapContainer">

    <!-- MAP IMAGE -->
    <img src="maine-map.png" class="map">

    <!-- EXISTING PINS -->

    <div class="pin bath">
      <div class="tooltip">Bath</div>
    </div>

    <div class="pin woolwich">
      <div class="tooltip">Woolwich</div>
    </div>

    <div class="pin mess">
      <div class="tooltip">Messalonskee</div>
    </div>

    <div class="pin socopee">
      <div class="tooltip">Sacopee Valley</div>
    </div>

    <div class="pin rockland">
      <div class="tooltip">Rockland</div>
    </div>

    <!-- USER PIN -->
    <div class="user-pin" id="userPin"></div>

  </div>

</section>

<script>

const pin = document.getElementById("userPin");
const map = document.getElementById("mapContainer");

let dragging = false;

function showPin(){

  pin.style.display = "block";

  pin.style.left = "180px";
  pin.style.top = "180px";

}

pin.addEventListener("mousedown", () => {
  dragging = true;
});

document.addEventListener("mouseup", () => {
  dragging = false;
});

document.addEventListener("mousemove", (e) => {

  if(!dragging) return;

  const rect = map.getBoundingClientRect();

  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  x = Math.max(0, Math.min(x, rect.width - 20));
  y = Math.max(0, Math.min(y, rect.height - 20));

  pin.style.left = x + "px";
  pin.style.top = y + "px";

});

</script>

</body>
</html>
