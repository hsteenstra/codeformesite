<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Code For ME Map</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f7fb;
  padding:40px;
  color:#1f3c58;
}

.wrapper{
  display:flex;
  gap:50px;
  align-items:flex-start;
  flex-wrap:wrap;
}

/* LEFT SIDE */

.sidebar{
  width:320px;
}

.sidebar h1{
  font-size:3rem;
  margin-bottom:10px;
}

.sidebar p{
  line-height:1.6;
  margin-bottom:25px;
  color:#5d6b78;
}

/* FORM */

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
  font-size:1rem;
}

button{
  border:none;
  padding:14px 18px;
  border-radius:12px;
  background:#68b6ba;
  color:white;
  cursor:pointer;
  font-size:1rem;
  transition:.2s;
  width:100%;
}

button:hover{
  background:#4d9ca0;
}

/* MAP */

.map-container{
  position:relative;
  width:420px;
}

.map{
  width:100%;
  user-select:none;
  pointer-events:none;
}

/* PINS */

.pin{
  position:absolute;
  width:22px;
  height:22px;
  background:#efab03;
  border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  border:2px solid white;
  cursor:pointer;
}

.pin::after{
  content:'';
  width:8px;
  height:8px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:5px;
  left:5px;
}

/* TOOLTIP */

.tooltip{
  position:absolute;
  top:-35px;
  left:-15px;
  background:#1f3c58;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  font-size:.8rem;
  white-space:nowrap;
  opacity:0;
  transition:.2s;
  pointer-events:none;
}

.pin:hover .tooltip{
  opacity:1;
}

/* ADMIN BOX */

.admin{
  margin-top:30px;
  padding:20px;
  background:white;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.admin h2{
  margin-bottom:10px;
}

.admin p{
  font-size:.95rem;
  color:#5d6b78;
  margin-bottom:15px;
}

.code-box{
  background:#edf2f7;
  padding:15px;
  border-radius:12px;
  font-family:monospace;
  font-size:.9rem;
  overflow:auto;
  white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="wrapper">

  <!-- LEFT SIDE -->
  <div class="sidebar">

    <h1>Across Maine</h1>

    <p>
      Schools can submit where they’re from,
      and you can place their pin on the map yourself.
    </p>

    <!-- USER FORM -->
    <input type="text" id="schoolInput" placeholder="School or town">

    <button onclick="startPin()">
      Create Pin
    </button>

    <!-- ADMIN -->
    <div class="admin">

      <h2>Admin Mode</h2>

      <p>
        Drag the pin onto the map.  
        Then copy the generated code below
        and paste it into your HTML.
      </p>

      <div class="code-box" id="codeOutput">
No pin created yet.
      </div>

    </div>

  </div>

  <!-- MAP -->
  <div class="map-container" id="mapContainer">

    <img src="maine-map.png" class="map">

  </div>

</div>

<script>

const map = document.getElementById("mapContainer");
const codeOutput = document.getElementById("codeOutput");

let currentPin = null;
let dragging = false;

/* CREATE PIN */

function startPin(){

  const schoolName =
    document.getElementById("schoolInput").value;

  if(schoolName.trim() === ""){
    alert("Enter a school name first.");
    return;
  }

  /* REMOVE OLD TEMP PIN */
  if(currentPin){
    currentPin.remove();
  }

  /* CREATE NEW PIN */
  currentPin = document.createElement("div");
  currentPin.classList.add("pin");

  currentPin.innerHTML =
  `<div class="tooltip">${schoolName}</div>`;

  currentPin.style.left = "180px";
  currentPin.style.top = "180px";

  map.appendChild(currentPin);

  enableDragging(currentPin, schoolName);

}

/* DRAGGING */

function enableDragging(pin, schoolName){

  pin.addEventListener("mousedown", () => {
    dragging = true;
  });

  document.addEventListener("mouseup", () => {
    dragging = false;
  });

  document.addEventListener("mousemove", (e) => {

    if(!dragging) return;

    const rect = map.getBoundingClientRect();

    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    x = Math.max(0, Math.min(x, rect.width - 20));
    y = Math.max(0, Math.min(y, rect.height - 20));

    pin.style.left = x + "px";
    pin.style.top = y + "px";

    /* GENERATE CODE */

    codeOutput.innerText = `
<div class="pin"
     style="left:${x}px; top:${y}px;">

  <div class="tooltip">
    ${schoolName}
  </div>

</div>
`;

  });

}

</script>

</body>
</html>
