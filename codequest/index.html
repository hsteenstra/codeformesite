<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CodeQuest</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="desktop">

  <div class="topbar">
    <div class="brand">CodeQuest Learning System</div>
    <div class="status">Online</div>
  </div>

  <div class="grid">

    <div class="app" onclick="openApp('html')">
      <div class="icon"></div>
      <div class="label">HTML Harbor</div>
    </div>

    <div class="app" onclick="openApp('css')">
      <div class="icon"></div>
      <div class="label">CSS City</div>
    </div>

    <div class="app" onclick="openApp('js')">
      <div class="icon"></div>
      <div class="label">JavaScript Junction</div>
    </div>

    <div class="app" onclick="openApp('python')">
      <div class="icon"></div>
      <div class="label">Python Core</div>
    </div>

  </div>

  <div id="window" class="window hidden">
    <div class="windowHeader">
      <div id="title"></div>
      <button onclick="closeApp()">Close</button>
    </div>

    <div id="content" class="content"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
