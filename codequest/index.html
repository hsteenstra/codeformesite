<!DOCTYPE html>
<html>
<head>
<title>CodeQuest OS</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="desktop">

    <!-- TOP BAR -->
    <div class="topbar">
        <div class="logo">🧠 CodeQuest OS</div>
        <div class="time">Learning Environment</div>
    </div>

    <!-- DESKTOP ICONS -->
    <div class="icons">

        <div class="icon" onclick="openApp('html')">
            🌐
            <p>HTML Harbor</p>
        </div>

        <div class="icon" onclick="openApp('css')">
            🎨
            <p>CSS City</p>
        </div>

        <div class="icon" onclick="openApp('js')">
            ⚡
            <p>JavaScript</p>
        </div>

        <div class="icon" onclick="openApp('python')">
            🐍
            <p>Python</p>
        </div>

    </div>

    <!-- WINDOW -->
    <div id="window" class="window hidden">

        <div class="window-bar">
            <span id="title">Lesson</span>
            <button onclick="closeWindow()">✕</button>
        </div>

        <div id="content" class="window-content"></div>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
