<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CodeQuest OS</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="desktop">

  <div class="topbar">
    <div class="brand">CodeQuest Learning System</div>
    <div class="status">Session Active</div>
  </div>

  <div class="main">

    <div class="panel">
      <h2>Learning Modules</h2>

      <div class="app" onclick="openApp('html')">
        <div class="dot"></div>
        <div>
          <h3>HTML Harbor</h3>
          <p>Structure the web through real concepts</p>
        </div>
      </div>

      <div class="app" onclick="openApp('css')">
        <div class="dot blue"></div>
        <div>
          <h3>CSS City</h3>
          <p>Design, layout, and visual systems</p>
        </div>
      </div>

    </div>

    <div class="panel right">
      <h2>System Status</h2>
      <p>Progress tracking enabled</p>
      <p>Lesson engine: active</p>
      <p>Modules loaded: 2</p>
    </div>

  </div>

  <div id="window" class="window hidden">
    <div class="windowTop">
      <div id="title"></div>
      <button onclick="closeApp()">Close</button>
    </div>

    <div id="content" class="content"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
